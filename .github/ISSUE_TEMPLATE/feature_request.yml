name: Feature request
description: Propose a package-level improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What limitation are you hitting today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the package-level change you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      placeholder: Explain why this belongs in the shared runtime instead of app-specific code.
