name: Bug report
description: Report a reproducible bug in the package or example app.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal reproduction when possible.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: react-native-version
    attributes:
      label: React Native version
      placeholder: 0.8x.x
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened
      placeholder: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: List the smallest set of steps needed to reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      placeholder: Paste build logs, runtime errors, or screenshots if available.
